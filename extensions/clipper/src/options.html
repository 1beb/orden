<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>orden clipper options</title>
    <style>
      body {
        font: 14px/1.5 -apple-system, system-ui, sans-serif;
        margin: 24px;
        max-width: 480px;
        color: #1f2937;
      }
      h1 { font-size: 18px; margin: 0 0 16px; }
      label { display: block; font-weight: 600; margin-bottom: 6px; }
      input[type="text"] {
        width: 100%;
        padding: 8px 10px;
        font: inherit;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        box-sizing: border-box;
      }
      .row { margin-bottom: 16px; }
      button {
        padding: 8px 16px;
        font: inherit;
        background: #2563eb;
        color: #fff;
        border: 0;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover { background: #1d4ed8; }
      button.secondary { margin-left: 8px; background: #4b5563; }
      button.secondary:hover { background: #374151; }
      .status { margin-left: 10px; color: #059669; font-weight: 600; }
      .status.err { color: #dc2626; }
    </style>
  </head>
  <body>
    <h1>orden clipper</h1>
    <div class="row">
      <label for="host-url">orden host URL</label>
      <input id="host-url" type="text" placeholder="http://127.0.0.1:4319" />
    </div>
    <div class="row">
      <button id="save">Save</button>
      <button id="test" class="secondary">Test connection</button>
      <span id="status" class="status" hidden>Saved</span>
      <span id="test-status" class="status" hidden></span>
    </div>
    <script type="module" src="options.js"></script>
  </body>
</html>
